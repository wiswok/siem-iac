- name: Definir searchSource para saved search CVE
  ansible.builtin.set_fact:
    _search_src_cve_latest: '{"query":{"query":"rule.groups: vulnerability-detector","language":"kuery"},"filter":[],"indexRefName":"kibanaSavedObjectMeta.searchSourceJSON.index"}'

- name: Crear saved search - CVE Inventario Activo
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/search/wazuh-cve-inventory-active?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "Wazuh CVE - Inventario Activo (Actual)"
        description: "Lista de vulnerabilidades que persisten actualmente en los activos."
        columns:
          - "agent.name"
          - "data.vulnerability.severity"
          - "data.vulnerability.cve"
          - "data.vulnerability.package.name"
          - "data.vulnerability.package.version"
          - "rule.description"
        sort: [["data.vulnerability.severity", "desc"]]
        grid: {}
        kibanaSavedObjectMeta:
          searchSourceJSON: '{"query":{"language":"kuery","query":"NOT rule.id: 23502"},"filter":[],"indexRefName":"kibanaSavedObjectMeta.searchSourceJSON.index"}'
      references:
        - name: "kibanaSavedObjectMeta.searchSourceJSON.index"
          type: index-pattern
          id: wazuh-vulnerabilities-inventory
    status_code: [200, 201]

- name: Crear saved search - CVE últimos eventos
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/search/wazuh-cve-search-latest?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "Wazuh CVE - Últimos eventos (log completo)"
        description: "Últimos eventos de vulnerability-detector. Expande cualquier fila para ver el documento completo."
        columns:
          - "@timestamp"
          - "agent.name"
          - "rule.id"
          - "data.vulnerability.severity"
          - "data.vulnerability.cve"
          - "data.vulnerability.package.name"
          - "data.vulnerability.package.version"
          - "rule.description"
        sort: [["@timestamp", "desc"]]
        grid: {}
        hideChart: false
        isTextBasedQuery: false
        kibanaSavedObjectMeta:
          searchSourceJSON: "{{ _search_src_cve_latest | string }}"
      references:
        - name: "kibanaSavedObjectMeta.searchSourceJSON.index"
          type: index-pattern
          id: wazuh-dataview
    status_code: [200, 201]

# ============================================================
# WAZUH CVE — dashboard
# Layout 48 cols:
#  Row 0 [y=0,  h=6]:  [0,12 Crit] [12,12 High] [24,12 Med] [36,12 Low]
#  Row 1 [y=6,  h=6]:  [0,12 Únicos] [12,12 Agentes] [24,12 Paquetes] [36,12 Max CVSS]
#  Row 2 [y=12, h=12]: [0,48 Timeline]
#  Row 3 [y=24, h=16]: [0,28 Top CVEs] [28,20 Donut severidad]
#  Row 4 [y=40, h=14]: [0,24 Por agente] [24,24 Top paquetes]
#  Row 5 [y=54, h=18]: [0,48 Saved search log]
# ============================================================
- name: Definir paneles del dashboard CVE
  ansible.builtin.set_fact:
    _cve_panels:
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 0,  w: 12, h: 6,  i: "1" },  panelIndex: "1",  embeddableConfig: { enhancements: {} }, panelRefName: panel_1 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 12, y: 0,  w: 12, h: 6,  i: "2" },  panelIndex: "2",  embeddableConfig: { enhancements: {} }, panelRefName: panel_2 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 24, y: 0,  w: 12, h: 6,  i: "3" },  panelIndex: "3",  embeddableConfig: { enhancements: {} }, panelRefName: panel_3 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 36, y: 0,  w: 12, h: 6,  i: "4" },  panelIndex: "4",  embeddableConfig: { enhancements: {} }, panelRefName: panel_4 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 6,  w: 12, h: 6,  i: "5" },  panelIndex: "5",  embeddableConfig: { enhancements: {} }, panelRefName: panel_5 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 12, y: 6,  w: 12, h: 6,  i: "6" },  panelIndex: "6",  embeddableConfig: { enhancements: {} }, panelRefName: panel_6 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 24, y: 6,  w: 12, h: 6,  i: "7" },  panelIndex: "7",  embeddableConfig: { enhancements: {} }, panelRefName: panel_7 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 36, y: 6,  w: 12, h: 6,  i: "8" },  panelIndex: "8",  embeddableConfig: { enhancements: {} }, panelRefName: panel_8 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 12, w: 48, h: 12, i: "9" },  panelIndex: "9",  embeddableConfig: { enhancements: {} }, panelRefName: panel_9 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 24, w: 28, h: 16, i: "10" }, panelIndex: "10", embeddableConfig: { enhancements: {} }, panelRefName: panel_10 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 28, y: 24, w: 20, h: 16, i: "11" }, panelIndex: "11", embeddableConfig: { enhancements: {} }, panelRefName: panel_11 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 40, w: 24, h: 14, i: "12" }, panelIndex: "12", embeddableConfig: { enhancements: {} }, panelRefName: panel_12 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 24, y: 40, w: 24, h: 14, i: "13" }, panelIndex: "13", embeddableConfig: { enhancements: {} }, panelRefName: panel_13 }
      - { version: "{{ kibana_version }}", type: search,        gridData: { x: 0,  y: 54, w: 48, h: 15, i: "15" }, panelIndex: "15", embeddableConfig: { enhancements: {} }, panelRefName: panel_15, title: "Wazuh CVE - Inventario Activo (Actual)" }
      - { version: "{{ kibana_version }}", type: search,        gridData: { x: 0,  y: 69, w: 48, h: 15, i: "14" }, panelIndex: "14", embeddableConfig: { enhancements: {} }, panelRefName: panel_14, title: "Wazuh CVE - Historial de Eventos (log completo)" }

- name: Definir controlGroupInput del dashboard CVE (filtro por agente)
  ansible.builtin.set_fact:
    _cve_control_panels_json: '{"agent-control-1":{"order":0,"width":"medium","grow":true,"type":"optionsListControl","explicitInput":{"id":"agent-control-1","fieldName":"agent.name.keyword","title":"Agente","dataViewId":"wazuh-vulnerabilities-inventory","enhancements":{}}}}'

- name: Crear dashboard de Wazuh CVE
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/dashboard/wazuh-cve-dashboard?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "SIEM - Vulnerabilidades (Wazuh VD)"
        description: "CVEs detectados por Wazuh Vulnerability Detector: severidad (solo activos), agentes afectados, paquetes vulnerables, timeline con activo/resuelto y log completo."
        hits: 0
        panelsJSON: "{{ _cve_panels | to_json }}"
        optionsJSON: '{"useMargins":true,"syncColors":false,"hidePanelTitles":false}'
        timeRestore: true
        timeFrom: "now-30d"
        timeTo: "now"
        refreshInterval: {"pause": false, "value": 300000}
        controlGroupInput:
          controlStyle: "oneLine"
          chainingSystem: "HIERARCHICAL"
          panelsJSON: "{{ _cve_control_panels_json | string }}"
          ignoreParentSettingsJSON: '{"ignoreFilters":false,"ignoreQuery":false,"ignoreTimerange":false,"ignoreValidations":false}'
        kibanaSavedObjectMeta:
          searchSourceJSON: '{"query":{"language":"kuery","query":""},"filter":[]}'
      references:
        - { name: panel_1,  type: visualization, id: wazuh-cve-metric-critical }
        - { name: panel_2,  type: visualization, id: wazuh-cve-metric-high }
        - { name: panel_3,  type: visualization, id: wazuh-cve-metric-medium }
        - { name: panel_4,  type: visualization, id: wazuh-cve-metric-low }
        - { name: panel_5,  type: visualization, id: wazuh-cve-metric-unique }
        - { name: panel_6,  type: visualization, id: wazuh-cve-metric-agents }
        - { name: panel_7,  type: visualization, id: wazuh-cve-metric-packages }
        - { name: panel_8,  type: visualization, id: wazuh-cve-metric-solved }
        - { name: panel_9,  type: visualization, id: wazuh-cve-area-timeline }
        - { name: panel_10, type: visualization, id: wazuh-cve-table-top }
        - { name: panel_11, type: visualization, id: wazuh-cve-pie-severity }
        - { name: panel_12, type: visualization, id: wazuh-cve-table-by-agent }
        - { name: panel_13, type: visualization, id: wazuh-cve-table-packages }
        - { name: panel_14, type: search,        id: wazuh-cve-search-latest }
        - { name: panel_15, type: search,        id: wazuh-cve-inventory-active }
    status_code: [200, 201]

