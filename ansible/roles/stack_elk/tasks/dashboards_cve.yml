          percentageMode: false
          useRanges: false
          colorSchema: "Green to Red"
          metricColorMode: "None"
          colorsRange:
            - from: 0
              to: 1000000
          labels:
            show: true
          invertColors: false
          style:
            bgFill: "#8B0000"
            bgColor: true
            labelColor: false
