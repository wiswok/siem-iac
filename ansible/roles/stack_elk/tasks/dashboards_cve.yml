---
# ============================================================
# WAZUH CVE / VULNERABILIDADES — search sources
# ============================================================
- name: Definir search sources de Wazuh CVE
  ansible.builtin.set_fact:
    _cve_src_all:
      index: "wazuh-dataview"
      filter: []
      query:
        query: "rule.groups: vulnerability-detector"
        language: kuery

    _cve_src_active:
      index: "wazuh-vulnerabilities-inventory"
      filter: []
      query:
        query: "NOT rule.id: 23502"
        language: kuery

    _cve_src_solved:
      index: "wazuh-dataview"
      filter: []
      query:
        query: "rule.groups: vulnerability-detector AND rule.id: 23502"
        language: kuery

    _cve_src_critical:
      index: "wazuh-vulnerabilities-inventory"
      filter: []
      query:
        query: "data.vulnerability.severity: Critical AND NOT rule.id: 23502"
        language: kuery

    _cve_src_high:
      index: "wazuh-vulnerabilities-inventory"
      filter: []
      query:
        query: "data.vulnerability.severity: High AND NOT rule.id: 23502"
        language: kuery

    _cve_src_medium:
      index: "wazuh-vulnerabilities-inventory"
      filter: []
      query:
        query: "data.vulnerability.severity: Medium AND NOT rule.id: 23502"
        language: kuery

    _cve_src_low:
      index: "wazuh-vulnerabilities-inventory"
      filter: []
      query:
        query: "data.vulnerability.severity: Low AND NOT rule.id: 23502"
        language: kuery

