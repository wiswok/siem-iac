# ============================================================
# WAZUH CVE — visualizaciones de análisis
# ============================================================
- name: Definir visualizaciones de análisis CVE
  ansible.builtin.set_fact:
    _cve_vis_timeline:
      title: "Wazuh CVE - Detecciones en el tiempo"
      type: histogram
      params:
        type: histogram
        grid:
          categoryLines: false
          valueAxis: ~
        categoryAxes:
          - id: CategoryAxis-1
            type: category
            position: bottom
            show: true
            style: {}
            scale:
              type: linear
            labels:
              show: true
              filter: true
              truncate: 100
            title: {}
        valueAxes:
          - id: ValueAxis-1
            name: LeftAxis-1
            type: value
            position: left
            show: true
            style: {}
            scale:
              type: linear
              mode: normal
            labels:
              show: true
              rotate: 0
              filter: false
              truncate: 100
            title:
              text: "Alertas CVE"
        seriesParams:
          - show: true
            type: histogram
            mode: stacked
            data:
              label: "Alertas CVE"
              id: "1"
            valueAxis: ValueAxis-1
            drawLinesBetweenPoints: true
            lineWidth: 2
            showCircles: true
            interpolate: linear
        addTooltip: true
        addLegend: true
        legendPosition: right
        times: []
        addTimeMarker: false
        detailedTooltip: true
        fittingFunction: none
        thresholdLine:
          show: false
          value: 10
          width: 1
          style: full
          color: "#E7664C"
        labels: {}
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: date_histogram
          params:
            field: "@timestamp"
            useNormalizedEsInterval: true
            interval: auto
            drop_partials: false
            min_doc_count: 1
            extended_bounds: {}
          schema: segment
        - id: "3"
          enabled: true
          type: filters
          params:
            filters:
              - input:
                  query: "NOT rule.id: 23502"
                  language: kuery
                label: "Activos"
              - input:
                  query: "rule.id: 23502"
                  language: kuery
                label: "Resueltos"
          schema: group

    _cve_vis_severity_pie:
      title: "Wazuh CVE - Distribución por severidad"
      type: pie
      params:
        type: pie
        addTooltip: true
        addLegend: true
        legendPosition: bottom
        isDonut: true
        labels:
          show: false
          values: true
          last_level: true
          truncate: 100
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "data.vulnerability.severity.keyword"
            orderBy: "1"
            order: desc
            size: 4
            otherBucket: false
            missingBucket: false
          schema: segment

    _cve_vis_top_cves:
      title: "Wazuh CVE - Top 10 CVEs"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "data.vulnerability.cve.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

    _cve_vis_by_agent:
      title: "Wazuh CVE - CVEs únicos por agente"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: cardinality
          params:
            field: "data.vulnerability.cve.keyword"
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "agent.id.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

    _cve_vis_top_packages:
      title: "Wazuh CVE - Top 10 paquetes vulnerables"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: cardinality
          params:
            field: "data.vulnerability.cve.keyword"
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "data.vulnerability.package.name.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

# ============================================================
# WAZUH CVE — crear visualizaciones (KPIs severidad)
# ============================================================
- name: Crear visualización CVE - Critical
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/visualization/wazuh-cve-metric-critical?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "Wazuh CVE - Critical"
        visState: "{{ _cve_vis_critical | to_json }}"
        uiStateJSON: "{}"
        description: ""
        kibanaSavedObjectMeta:
          searchSourceJSON: "{{ _cve_src_critical | to_json }}"
      references:
        - name: kibanaSavedObjectMeta.searchSourceJSON.index
          type: index-pattern
          id: wazuh-vulnerabilities-inventory
    status_code: [200, 201]

