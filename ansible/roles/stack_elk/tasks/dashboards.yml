- name: Crear dashboard SIEM - Resumen SOC
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/dashboard/siem-soc-overview?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "SIEM - Resumen SOC"
        description: "Vista unificada: KPIs, líneas temporales, alertas críticas recientes con log completo y contexto (Wazuh + Suricata)"
        hits: 0
        panelsJSON: "{{ _soc_panels | to_json }}"
        optionsJSON: '{"useMargins":true,"syncColors":false,"hidePanelTitles":false}'
        timeRestore: true
        timeFrom: "now-24h"
        timeTo: "now"
        refreshInterval: {"pause": false, "value": 60000}
        kibanaSavedObjectMeta:
          searchSourceJSON: '{"query":{"language":"kuery","query":""},"filter":[]}'
      references:
        - { name: panel_1,  type: visualization, id: wazuh-metric-total }
        - { name: panel_2,  type: visualization, id: wazuh-metric-critical }
        - { name: panel_3,  type: visualization, id: suricata-metric-total }
        - { name: panel_4,  type: visualization, id: suricata-metric-unique-sigs }
        - { name: panel_5,  type: visualization, id: wazuh-area-timeline }
        - { name: panel_6,  type: visualization, id: suricata-area-timeline }
        - { name: panel_7,  type: search,        id: wazuh-search-critical }
        - { name: panel_8,  type: search,        id: suricata-search-critical }
        - { name: panel_9,  type: visualization, id: wazuh-table-rules }
        - { name: panel_10, type: visualization, id: suricata-table-signatures }
    status_code: [200, 201]
