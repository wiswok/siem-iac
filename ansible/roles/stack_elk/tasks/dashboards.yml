# ============================================================
# SURICATA — dashboard
# Layout 48 cols:
#  Row 0 [h=6]:  [0,16 Total] [16,16 Firmas Únicas] [32,16 IPs Únicas]
#  Row 1 [h=12]: [0,48 Timeline]
#  Row 2 [h=16]: [0,28 Top Firmas] [28,20 Categorías donut]
#  Row 3 [h=14]: [0,24 Top IPs Origen] [24,24 Top IPs Destino]
#  Row 4 [h=12]: [0,48 Top Puertos Destino] <- ancho completo para variedad
# ============================================================
- name: Definir paneles del dashboard de Suricata
  ansible.builtin.set_fact:
    _suricata_panels:
      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 0,  w: 16, h: 6,  i: "1" }
        panelIndex: "1"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_1

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 16, y: 0,  w: 16, h: 6,  i: "2" }
        panelIndex: "2"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_2

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 32, y: 0,  w: 16, h: 6,  i: "3" }
        panelIndex: "3"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_3

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 6,  w: 48, h: 12, i: "4" }
        panelIndex: "4"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_4

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 18, w: 28, h: 16, i: "5" }
        panelIndex: "5"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_5

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 28, y: 18, w: 20, h: 16, i: "6" }
        panelIndex: "6"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_6

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 34, w: 24, h: 14, i: "7" }
        panelIndex: "7"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_7

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 24, y: 34, w: 24, h: 14, i: "8" }
        panelIndex: "8"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_8

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 48, w: 48, h: 12, i: "9" }
        panelIndex: "9"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_9

- name: Crear dashboard de Suricata
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/dashboard/suricata-dashboard?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "SIEM - Suricata IDS"
        description: "Alertas e incidentes detectados por Suricata (ET Open rules)"
        hits: 0
        panelsJSON: "{{ _suricata_panels | to_json }}"
        optionsJSON: '{"useMargins":true,"syncColors":false,"hidePanelTitles":false}'
        timeRestore: false
        kibanaSavedObjectMeta:
          searchSourceJSON: '{"query":{"language":"kuery","query":""},"filter":[]}'
      references:
        - { name: panel_1, type: visualization, id: suricata-metric-total }
        - { name: panel_2, type: visualization, id: suricata-metric-unique-sigs }
        - { name: panel_3, type: visualization, id: suricata-metric-unique-ips }
        - { name: panel_4, type: visualization, id: suricata-area-timeline }
        - { name: panel_5, type: visualization, id: suricata-table-signatures }
        - { name: panel_6, type: visualization, id: suricata-pie-categories }
        - { name: panel_7, type: visualization, id: suricata-table-src-ips }
        - { name: panel_8, type: visualization, id: suricata-table-dst-ips }
        - { name: panel_9, type: visualization, id: suricata-table-dst-ports }
    status_code: [200, 201]

# ============================================================
# WAZUH — search sources
# ============================================================
- name: Definir search sources de Wazuh
  ansible.builtin.set_fact:
    _wazuh_src_all:
      index: "wazuh-dataview"
      filter: []
      query:
        query: "NOT rule.groups: vulnerability-detector"
        language: kuery

    _wazuh_src_high:
      index: "wazuh-dataview"
      filter: []
      query:
        query: "rule.level >= 7 AND NOT rule.groups: vulnerability-detector"
        language: kuery

    _wazuh_src_critical:
      index: "wazuh-dataview"
      filter: []
      query:
        query: "rule.level >= 12 AND NOT rule.groups: vulnerability-detector"
        language: kuery

    _wazuh_src_auth:
      index: "wazuh-dataview"
      filter: []
      query:
        query: "rule.groups: authentication_failed OR rule.groups: authentication_failures"
        language: kuery

