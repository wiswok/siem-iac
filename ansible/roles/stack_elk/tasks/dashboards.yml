# ============================================================
# DASHBOARD SOC — Resumen unificado de alertas
# Layout 48 cols:
#  Row 0 [h=6]:   KPIs [0,12 Wazuh total] [12,12 Wazuh críticas] [24,12 Suricata total] [36,12 Suricata firmas]
#  Row 1 [h=12]:  Timelines [0,24 Wazuh] [24,24 Suricata]
#  Row 2 [h=18]:  Alertas críticas recientes [0,24 Wazuh search crit] [24,24 Suricata search crit]
#  Row 3 [h=14]:  Contexto [0,24 Top reglas Wazuh] [24,24 Top firmas Suricata]
# ============================================================
- name: Definir paneles del dashboard SOC
  ansible.builtin.set_fact:
    _soc_panels:
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 0,  w: 12, h: 6,  i: "1" }, panelIndex: "1", embeddableConfig: { enhancements: {} }, panelRefName: panel_1 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 12, y: 0,  w: 12, h: 6,  i: "2" }, panelIndex: "2", embeddableConfig: { enhancements: {} }, panelRefName: panel_2 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 24, y: 0,  w: 12, h: 6,  i: "3" }, panelIndex: "3", embeddableConfig: { enhancements: {} }, panelRefName: panel_3 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 36, y: 0,  w: 12, h: 6,  i: "4" }, panelIndex: "4", embeddableConfig: { enhancements: {} }, panelRefName: panel_4 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 0,  y: 6,  w: 24, h: 12, i: "5" }, panelIndex: "5", embeddableConfig: { enhancements: {} }, panelRefName: panel_5 }
      - { version: "{{ kibana_version }}", type: visualization, gridData: { x: 24, y: 6,  w: 24, h: 12, i: "6" }, panelIndex: "6", embeddableConfig: { enhancements: {} }, panelRefName: panel_6 }
      - { version: "{{ kibana_version }}", type: search,        gridData: { x: 0,  y: 18, w: 24, h: 18, i: "7" }, panelIndex: "7", embeddableConfig: { enhancements: {} }, panelRefName: panel_7, title: "Últimas alertas Wazuh críticas (nivel ≥ 12)" }
