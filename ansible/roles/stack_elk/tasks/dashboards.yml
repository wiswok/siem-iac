---
# ============================================================
# SURICATA — search sources
# ============================================================
- name: Definir search sources de Suricata
  ansible.builtin.set_fact:
    _suricata_src:
      index: "suricata-dataview"
      filter: []
      query:
        query: "event_type: alert"
        language: kuery

# ============================================================
# SURICATA — visualizaciones
# ============================================================
- name: Definir visualizaciones KPI de Suricata
  ansible.builtin.set_fact:
    _suricata_vis_total:
      title: "Suricata - Total Alertas"
      type: metric
      params:
        addTooltip: true
        addLegend: false
        type: metric
        metric:
          percentageMode: false
          useRanges: false
          colorSchema: "Green to Red"
          metricColorMode: "None"
          colorsRange:
            - from: 0
              to: 1000000
          labels:
            show: true
          invertColors: false
          style:
            bgFill: "#000"
            bgColor: false
            labelColor: false
            subText: "alertas totales"
            fontSize: 48
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric

    _suricata_vis_unique_sigs:
      title: "Suricata - Firmas Únicas"
      type: metric
      params:
        addTooltip: true
        addLegend: false
        type: metric
        metric:
          percentageMode: false
          useRanges: false
          colorSchema: "Green to Red"
          metricColorMode: "None"
          colorsRange:
            - from: 0
              to: 1000000
          labels:
            show: true
          invertColors: false
          style:
            bgFill: "#000"
            bgColor: false
            labelColor: false
            subText: "reglas distintas"
            fontSize: 48
      aggs:
        - id: "1"
          enabled: true
          type: cardinality
          params:
            field: "alert.signature.keyword"
          schema: metric

    _suricata_vis_unique_ips:
      title: "Suricata - IPs Origen Únicas"
      type: metric
      params:
        addTooltip: true
        addLegend: false
        type: metric
        metric:
          percentageMode: false
          useRanges: false
          colorSchema: "Green to Red"
          metricColorMode: "None"
          colorsRange:
            - from: 0
              to: 1000000
          labels:
            show: true
          invertColors: false
          style:
            bgFill: "#000"
            bgColor: false
            labelColor: false
            subText: "atacantes únicos"
            fontSize: 48
      aggs:
        - id: "1"
          enabled: true
          type: cardinality
          params:
            field: "src_ip.keyword"
          schema: metric

- name: Definir visualizaciones de análisis de Suricata
  ansible.builtin.set_fact:
    _suricata_vis_timeline:
      title: "Suricata - Alertas en el tiempo"
      type: histogram
      params:
        type: histogram
        grid:
          categoryLines: false
          valueAxis: ~
        categoryAxes:
          - id: CategoryAxis-1
            type: category
            position: bottom
            show: true
            style: {}
            scale:
              type: linear
            labels:
              show: true
              filter: true
              truncate: 100
            title: {}
        valueAxes:
          - id: ValueAxis-1
            name: LeftAxis-1
            type: value
            position: left
            show: true
            style: {}
            scale:
              type: linear
              mode: normal
            labels:
              show: true
              rotate: 0
              filter: false
              truncate: 100
            title:
              text: "Alertas"
        seriesParams:
          - show: true
            type: histogram
            mode: normal
            data:
              label: "Alertas"
              id: "1"
            valueAxis: ValueAxis-1
            drawLinesBetweenPoints: true
            lineWidth: 2
            showCircles: true
            interpolate: linear
        addTooltip: true
        addLegend: true
        legendPosition: right
        times: []
        addTimeMarker: false
        detailedTooltip: true
        fittingFunction: none
        thresholdLine:
          show: false
          value: 10
          width: 1
          style: full
          color: "#E7664C"
        labels: {}
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: date_histogram
          params:
            field: "@timestamp"
            useNormalizedEsInterval: true
            interval: auto
            drop_partials: false
            min_doc_count: 1
            extended_bounds: {}
          schema: segment

    _suricata_vis_signatures:
      title: "Suricata - Top 10 Firmas"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "alert.signature.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

    _suricata_vis_categories:
      title: "Suricata - Categorías de Alertas"
      type: pie
      params:
        type: pie
        addTooltip: true
        addLegend: true
        legendPosition: bottom
        isDonut: true
        labels:
          show: false
          values: true
          last_level: true
          truncate: 100
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "alert.category.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: true
            missingBucket: false
          schema: segment

    _suricata_vis_src_ips:
      title: "Suricata - Top 10 IPs Origen"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "src_ip.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

    _suricata_vis_dst_ips:
      title: "Suricata - Top 10 IPs Destino"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "dest_ip.keyword"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

    _suricata_vis_dst_ports:
      title: "Suricata - Top 10 Puertos Destino"
      type: table
      params:
        perPage: 10
        showPartialRows: false
        showMetricsAtAllLevels: false
        sort:
          columnIndex: null
          direction: null
        showTotal: false
        totalFunc: sum
      aggs:
        - id: "1"
          enabled: true
          type: count
          params: {}
          schema: metric
        - id: "2"
          enabled: true
          type: terms
          params:
            field: "dest_port"
            orderBy: "1"
            order: desc
            size: 10
            otherBucket: false
            missingBucket: false
          schema: bucket

# ============================================================
# SURICATA — crear visualizaciones
# ============================================================
- name: Crear visualización Suricata - Total Alertas
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/visualization/suricata-metric-total?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "Suricata - Total Alertas"
        visState: "{{ _suricata_vis_total | to_json }}"
        uiStateJSON: "{}"
        description: ""
        kibanaSavedObjectMeta:
          searchSourceJSON: "{{ _suricata_src | to_json }}"
      references:
        - name: kibanaSavedObjectMeta.searchSourceJSON.index
          type: index-pattern
          id: suricata-dataview
    status_code: [200, 201]

