# ============================================================
# WAZUH — dashboard
# Layout 48 cols:
#  Row 0 [h=6]:  [0,12 Total] [12,12 Nivel 7+] [24,12 Críticas] [36,12 Agentes]
#  Row 1 [h=12]: [0,48 Timeline]
#  Row 2 [h=16]: [0,28 Top Reglas] [28,20 Por Nivel donut]
#  Row 3 [h=14]: [0,24 Por Agente] [24,24 Auth Failures]
# ============================================================
- name: Definir paneles del dashboard de Wazuh
  ansible.builtin.set_fact:
    _wazuh_panels:
      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 0,  w: 12, h: 6,  i: "1" }
        panelIndex: "1"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_1

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 12, y: 0,  w: 12, h: 6,  i: "2" }
        panelIndex: "2"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_2

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 24, y: 0,  w: 12, h: 6,  i: "3" }
        panelIndex: "3"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_3

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 36, y: 0,  w: 12, h: 6,  i: "4" }
        panelIndex: "4"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_4

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 6,  w: 48, h: 12, i: "5" }
        panelIndex: "5"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_5

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 18, w: 28, h: 16, i: "6" }
        panelIndex: "6"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_6

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 28, y: 18, w: 20, h: 16, i: "7" }
        panelIndex: "7"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_7

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 0,  y: 34, w: 24, h: 14, i: "8" }
        panelIndex: "8"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_8

      - version: "{{ kibana_version }}"
        type: visualization
        gridData: { x: 24, y: 34, w: 24, h: 14, i: "9" }
        panelIndex: "9"
        embeddableConfig: { enhancements: {} }
        panelRefName: panel_9

- name: Crear dashboard de Wazuh
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/dashboard/wazuh-dashboard?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "SIEM - Wazuh HIDS"
        description: "Alertas de integridad, autenticación y seguridad de host detectadas por Wazuh"
        hits: 0
        panelsJSON: "{{ _wazuh_panels | to_json }}"
        optionsJSON: '{"useMargins":true,"syncColors":false,"hidePanelTitles":false}'
        timeRestore: false
        kibanaSavedObjectMeta:
          searchSourceJSON: '{"query":{"language":"kuery","query":""},"filter":[]}'
      references:
        - { name: panel_1, type: visualization, id: wazuh-metric-total }
        - { name: panel_2, type: visualization, id: wazuh-metric-high }
        - { name: panel_3, type: visualization, id: wazuh-metric-critical }
        - { name: panel_4, type: visualization, id: wazuh-metric-agents }
        - { name: panel_5, type: visualization, id: wazuh-area-timeline }
        - { name: panel_6, type: visualization, id: wazuh-table-rules }
        - { name: panel_7, type: visualization, id: wazuh-pie-levels }
        - { name: panel_8, type: visualization, id: wazuh-table-agents }
        - { name: panel_9, type: visualization, id: wazuh-table-auth-fail }
    status_code: [200, 201]

# ============================================================
# LIMPIEZA — borrar dashboards duplicados/huérfanos
# ============================================================
- name: Listar dashboards para detectar duplicados legacy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/_find?type=dashboard&per_page=100"
    method: GET
    headers:
      kbn-xsrf: "true"
  register: _all_dashboards

- name: Borrar dashboards legacy con título "Dashboard - *"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/dashboard/{{ item.id }}?force=true"
    method: DELETE
    headers:
      kbn-xsrf: "true"
    status_code: [200, 404]
  loop: "{{ _all_dashboards.json.saved_objects | selectattr('attributes.title', 'match', '^Dashboard - ') | list }}"
  loop_control:
    label: "{{ item.attributes.title }} ({{ item.id }})"

# ============================================================
# SAVED SEARCHES — tablas con log completo expandible
# ============================================================
- name: Definir searchSource JSONs para saved searches
  ansible.builtin.set_fact:
    _search_src_wazuh_all: '{"query":{"query":"NOT rule.groups: vulnerability-detector","language":"kuery"},"filter":[],"indexRefName":"kibanaSavedObjectMeta.searchSourceJSON.index"}'
    _search_src_wazuh_critical: '{"query":{"query":"rule.level >= 12 AND NOT rule.groups: vulnerability-detector","language":"kuery"},"filter":[],"indexRefName":"kibanaSavedObjectMeta.searchSourceJSON.index"}'
    _search_src_suricata_all: '{"query":{"query":"event_type: alert","language":"kuery"},"filter":[],"indexRefName":"kibanaSavedObjectMeta.searchSourceJSON.index"}'
    _search_src_suricata_critical: '{"query":{"query":"event_type: alert AND (alert.severity: 1 OR alert.category: \"A Network Trojan was detected\" OR alert.category: \"Malware Command and Control Activity Detected\" OR alert.category: \"Exploit Kit Activity Detected\" OR alert.category: \"Targeted Malicious Activity was Detected\" OR alert.category: \"Web Application Attack\")","language":"kuery"},"filter":[],"indexRefName":"kibanaSavedObjectMeta.searchSourceJSON.index"}'

- name: Crear saved search - Wazuh últimas alertas
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ kibana_port }}/api/saved_objects/search/wazuh-search-latest?overwrite=true"
    method: POST
    headers:
      kbn-xsrf: "true"
      Content-Type: "application/json"
    body_format: json
    body:
      attributes:
        title: "Wazuh - Últimas alertas (log completo)"
        description: "Últimos eventos Wazuh. Expande cualquier fila para ver el documento completo."
        columns: ["@timestamp", "agent.name", "rule.level", "rule.id", "rule.description", "rule.groups"]
        sort: [["@timestamp", "desc"]]
        grid: {}
        hideChart: false
        isTextBasedQuery: false
        kibanaSavedObjectMeta:
          searchSourceJSON: "{{ _search_src_wazuh_all | string }}"
      references:
        - name: "kibanaSavedObjectMeta.searchSourceJSON.index"
          type: index-pattern
